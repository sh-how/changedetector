  <circle cx="138" cy="78" r="4" fill="#2f6fed"/>
  <rect x="150" y="72" width="150" height="9" rx="4.5" fill="#1f2328"/>
  <rect x="150" y="88" width="250" height="7" rx="3.5" fill="#aeb6bf"/>
