  <!-- sidebar -->
  <rect x="22" y="48" width="96" height="230" fill="#f6f8fa"/>
  <rect x="34" y="66" width="60" height="8" rx="4" fill="#9aa3ad"/>
  <rect x="34" y="86" width="72" height="7" rx="3.5" fill="#c8ced6"/>
  <rect x="34" y="102" width="52" height="7" rx="3.5" fill="#c8ced6"/>
  <rect x="34" y="118" width="64" height="7" rx="3.5" fill="#c8ced6"/>

  <!-- inbox list rows -->
