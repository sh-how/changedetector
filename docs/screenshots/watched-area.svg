<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300" font-family="Segoe UI, system-ui, Arial, sans-serif">
  <rect width="480" height="300" fill="#dfe4ea"/>
  <!-- app window -->
