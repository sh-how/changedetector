  <!-- other rows -->
  <rect x="150" y="116" width="120" height="8" rx="4" fill="#c8ced6"/>
  <rect x="150" y="132" width="230" height="7" rx="3.5" fill="#d8dde3"/>
  <rect x="150" y="160" width="120" height="8" rx="4" fill="#c8ced6"/>
  <rect x="150" y="176" width="210" height="7" rx="3.5" fill="#d8dde3"/>

  <!-- watched-area highlight frame (drawn just outside the inbox region) -->
  <rect x="128" y="60" width="316" height="130" rx="6" fill="none" stroke="#ff3030" stroke-width="3"/>
  <rect x="128" y="40" width="74" height="18" rx="4" fill="#ff3030"/>
